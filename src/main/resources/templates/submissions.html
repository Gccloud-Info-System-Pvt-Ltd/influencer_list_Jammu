<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px 16px;
            color: #1f2937;
        }
        .wrap { max-width: 1100px; margin: 0 auto; }
        .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 22px; }
        a.btn { background: #2563eb; color: #fff; padding: 9px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
        th, td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #eef0f3; }
        th { background: #f8fafc; font-weight: 600; }
        tr:last-child td { border-bottom: none; }
        .empty { text-align: center; color: #6b7280; padding: 40px; background: #fff; border-radius: 12px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="head">
        <h1>All Submissions</h1>
        <a class="btn" th:href="@{/}">+ New Submission</a>
    </div>

    <div th:if="${submissions.isEmpty()}" class="empty">No submissions yet.</div>

    <table th:unless="${submissions.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Instagram</th>
            <th>Description</th>
            <th>District</th>
            <th>Extra One</th>
            <th>Extra Two</th>
            <th>Extra Three</th>
            <th>Created</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${submissions}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.name}"></td>
            <td th:text="${s.phone}"></td>
            <td th:text="${s.email}"></td>
            <td th:text="${s.instagram}"></td>
            <td th:text="${s.description}"></td>
            <td th:text="${s.district}"></td>
            <td th:text="${s.extraOne}"></td>
            <td th:text="${s.extraTwo}"></td>
            <td th:text="${s.extraThree}"></td>
            <td th:text="${#temporals.format(s.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
